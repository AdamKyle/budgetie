name: Backend Tests

on:
  push:
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    env:
      POSTGRES_DB: finance_harbour
      POSTGRES_USER: finance_harbour
      POSTGRES_PASSWORD: finance_harbour
      POSTGRES_PORT: 5432
      POSTGRES_HOST: database

      PGADMIN_DEFAULT_EMAIL: admin@financeharbour.ca
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_PORT: 5050

      BACKEND_PORT: 8000
      FRONTEND_PORT: 5173

      DJANGO_SECRET_KEY: github-actions-test-secret-key-that-is-long-enough
      SIMPLE_JWT_SIGNING_KEY: github-actions-test-jwt-signing-key-that-is-different
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,backend,finance-harbour.test,api.finance-harbour.test
      DJANGO_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://finance-harbour.test:5173
      DJANGO_CSRF_TRUSTED_ORIGINS: http://localhost:5173,http://finance-harbour.test:5173,http://api.finance-harbour.test:8000

      GOOGLE_OAUTH_CLIENT_ID: github-actions-google-client-id
      GOOGLE_OAUTH_CLIENT_SECRET: github-actions-google-client-secret
      GOOGLE_OAUTH_CALLBACK_URL: http://localhost:5173/auth/google/callback

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create CI env file
        run: |
          cat > .env <<EOF
          POSTGRES_DB=${POSTGRES_DB}
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          POSTGRES_PORT=${POSTGRES_PORT}
          POSTGRES_HOST=${POSTGRES_HOST}

          PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL}
          PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD}
          PGADMIN_PORT=${PGADMIN_PORT}

          BACKEND_PORT=${BACKEND_PORT}
          FRONTEND_PORT=${FRONTEND_PORT}

          DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
          SIMPLE_JWT_SIGNING_KEY=${SIMPLE_JWT_SIGNING_KEY}
          DJANGO_DEBUG=${DJANGO_DEBUG}
          DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
          DJANGO_CORS_ALLOWED_ORIGINS=${DJANGO_CORS_ALLOWED_ORIGINS}
          DJANGO_CSRF_TRUSTED_ORIGINS=${DJANGO_CSRF_TRUSTED_ORIGINS}

          GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID}
          GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET}
          GOOGLE_OAUTH_CALLBACK_URL=${GOOGLE_OAUTH_CALLBACK_URL}
          EOF

      - name: Build backend
        run: docker compose build backend

      - name: Start backend services
        run: docker compose up -d database backend

      - name: Run Django system check
        run: docker compose exec -T backend python manage.py check

      - name: Run Ruff check
        run: docker compose exec -T backend ruff check .

      - name: Run Ruff format check
        run: docker compose exec -T backend ruff format --check .

      - name: Run tests with coverage
        run: |
          docker compose exec -T backend coverage run \
            --source=. \
            --omit="*/migrations/*,*/tests/*,manage.py,config/*" \
            manage.py test

          docker compose exec -T backend coverage report -m

      - name: Stop containers
        if: always()
        run: docker compose down -v
